services:
  frontend:
    container_name: counter-frontend-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:5173"
    volumes:
      - .:/app
      - /app/node_modules
    profiles: ["dev"]

  frontend-prod:
    container_name: counter-frontend-prod
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    profiles: ["prod"]
